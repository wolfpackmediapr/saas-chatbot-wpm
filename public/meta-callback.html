<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connecting...</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card { text-align: center; padding: 2rem; max-width: 340px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99,179,237,0.2);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.5; }
    .small { font-size: 0.75rem; opacity: 0.55; }
    .error { color: #fc8181; }
  </style>
</head>
<body>
<div class="card" id="root">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Connecting your accounts&hellip;</p>
  <p class="small" id="sub">This window will close automatically.</p>
</div>
<script>
(function () {
  var appOrigin = window.location.origin;

  function setMsg(text, cls) {
    document.getElementById('spinner').style.display = 'none';
    var el = document.getElementById('msg');
    el.textContent = text;
    if (cls) el.className = cls;
  }

  function setSub(text) {
    document.getElementById('sub').textContent = text;
  }

  function sendToOpener(msg) {
    if (window.opener && window.opener !== window) {
      try { window.opener.postMessage(msg, appOrigin); } catch (_) {}
      setTimeout(function () { window.close(); }, 200);
      return true;
    }
    return false;
  }

  function showError(msg) {
    setMsg(msg, 'error');
    setSub('You can close this window.');
    if (window.opener && window.opener !== window) {
      try { window.opener.postMessage({ type: 'META_OAUTH_ERROR', error: msg }, appOrigin); } catch (_) {}
    }
  }

  var search = new URLSearchParams(window.location.search);

  // ── Error from Meta ────────────────────────────────────────────────────────
  var errorDesc = search.get('error_description') || search.get('error');
  if (errorDesc) {
    showError(decodeURIComponent(errorDesc.replace(/\+/g, ' ')));
    return;
  }

  // ── Authorization code from Facebook ──────────────────────────────────────
  var fbCode = search.get('code');
  if (fbCode) {
    var redirectUri = appOrigin + '/meta-callback';
    var payload = { type: 'META_OAUTH_CODE', code: fbCode, redirect_uri: redirectUri };

    var sent = sendToOpener(payload);
    if (!sent) {
      // Popup was opened in same tab — redirect back to the app with the code
      setMsg('Authorization received. Redirecting\u2026');
      setSub('');
      var fallback = appOrigin + '/dashboard/channel-connections'
        + '?meta_code=' + encodeURIComponent(fbCode)
        + '&redirect_uri=' + encodeURIComponent(redirectUri);
      setTimeout(function () { window.location.replace(fallback); }, 400);
    }
    return;
  }

  // ── Nothing to handle ─────────────────────────────────────────────────────
  if (!window.opener) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'This page is part of the OAuth flow.';
    document.getElementById('sub').textContent = 'Open it only through the app.';
  }
})();
</script>
</body>
</html>
